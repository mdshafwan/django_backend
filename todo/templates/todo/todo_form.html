<!-- todo/templates/todo/todo_form.html -->

{% extends 'todo/base.html' %}
{% block content %}
<h2>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Task</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'todo_list' %}">Cancel</a>
</form>
{% endblock %}

<!-- todo/templates/todo/register.html -->

{% extends 'todo/base.html' %}
{% block content %}
<h2>Register</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>
<p>Have account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
